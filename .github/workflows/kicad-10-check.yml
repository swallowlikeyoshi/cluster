name: KiCad 10 PCB DRC

on:
  push:
    branches:
      - "김민철"
    paths:
      - "hardware/HEVEN_Cluster_RevA/**"
      - ".github/workflows/kicad-10-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pcb-check:
    runs-on: ubuntu-latest

    env:
      KICAD_IMAGE: ghcr.io/kicad/kicad:10.0-full
      PROJECT_DIR: hardware/HEVEN_Cluster_RevA
      PCB_FILE: hardware/HEVEN_Cluster_RevA/HEVEN_Cluster_RevA.kicad_pcb

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare output folders
        run: |
          mkdir -p output/reports
          mkdir -p output/gerbers
          mkdir -p output/drill

      - name: Show cloud KiCad version
        run: |
          docker run --rm \
            -e LANG=C.UTF-8 \
            -e LC_ALL=C.UTF-8 \
            "$KICAD_IMAGE" \
            kicad-cli version

      - name: Confirm PCB file exists
        run: |
          echo "Project directory:"
          ls -la "$PROJECT_DIR"

          echo "PCB file:"
          test -f "$PCB_FILE"
          ls -l "$PCB_FILE"

      - name: Run PCB DRC
        id: drc
        continue-on-error: true
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -e LANG=C.UTF-8 \
            -e LC_ALL=C.UTF-8 \
            -v "$PWD:/work" \
            -w /work \
            "$KICAD_IMAGE" \
            kicad-cli pcb drc \
              --refill-zones \
              --all-track-errors \
              --severity-all \
              --format report \
              --exit-code-violations \
              --output output/reports/pcb-drc.rpt \
              "$PCB_FILE"

      - name: Export Gerbers after successful DRC
        if: steps.drc.outcome == 'success'
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -e LANG=C.UTF-8 \
            -e LC_ALL=C.UTF-8 \
            -v "$PWD:/work" \
            -w /work \
            "$KICAD_IMAGE" \
            kicad-cli pcb export gerbers \
              --output output/gerbers/ \
              --layers F.Cu,B.Cu,F.Mask,B.Mask,F.Silkscreen,B.Silkscreen,Edge.Cuts \
              --check-zones \
              "$PCB_FILE"

      - name: Export drill files after successful DRC
        if: steps.drc.outcome == 'success'
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -e LANG=C.UTF-8 \
            -e LC_ALL=C.UTF-8 \
            -v "$PWD:/work" \
            -w /work \
            "$KICAD_IMAGE" \
            kicad-cli pcb export drill \
              --output output/drill/ \
              --format excellon \
              --excellon-units mm \
              --generate-map \
              --map-format pdf \
              --generate-report \
              "$PCB_FILE"

      - name: Package manufacturing files
        if: steps.drc.outcome == 'success'
        run: |
          cd output
          zip -r HEVEN_Cluster_RevA_Gerber.zip gerbers drill

      - name: Upload DRC report and manufacturing outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: HEVEN-Cluster-KiCad-Output
          path: output/
          if-no-files-found: warn

      - name: Mark workflow failed when DRC has violations
        if: steps.drc.outcome == 'failure'
        run: |
          echo "KiCad DRC found violations."
          echo "Download the artifact and open output/reports/pcb-drc.rpt."
          exit 1

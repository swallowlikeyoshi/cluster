name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  native-tests:
    name: native-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PlatformIO
        run: pip install --upgrade platformio
      - name: Run native unit tests (pio test -e native)
        run: pio test -e native
